name: Build Sash Out-of-Tree Module
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Module Code
        uses: actions/checkout@v4
        with:
          path: sashimi-module

      - name: Checkout Sashimi Kernel Source
        uses: actions/checkout@v4
        with:
          repository: zyexro/sashimi_kernel_xiaomi_blossom
          path: kernel-source

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison gcc-aarch64-linux-gnu

      - name: Prepare Kernel Headers
        run: |
          cd kernel-source
          # Many MTK trees use the 'vendor' prefix for the defconfig
          # We check for blossom_defconfig or mt6765_defconfig
          if [ -f arch/arm64/configs/vendor/blossom_defconfig ]; then
            CONF=vendor/blossom_defconfig
          elif [ -f arch/arm64/configs/blossom_defconfig ]; then
            CONF=blossom_defconfig
          else
            # Fallback to the chipset generic
            CONF=mt6765_defconfig
          fi
          
          echo "Using Config: $CONF"
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- $CONF
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

      - name: Compile Sashimi Module
        run: |
          cd sashimi-module
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KDIR=$GITHUB_WORKSPACE/kernel-source
          
      - name: Upload Kernel Module (.ko)
        uses: actions/upload-artifact@v4
        with:
          name: sashimi_test_ko
          path: sashimi-module/*.ko
