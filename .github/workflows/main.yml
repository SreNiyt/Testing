name: Build Sash Out-of-Tree Module
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Module Code
        uses: actions/checkout@v4
        with:
          path: sashimi-module

      - name: Checkout Sashimi Kernel Source
        uses: actions/checkout@v4
        with:
          repository: zyexro/sashimi_kernel_xiaomi_blossom
          path: kernel-source

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          # Install Clang and LLVM alongside the standard tools
          sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison clang llvm lld

      - name: Prepare Kernel Headers
        run: |
          cd kernel-source
          # We must pass LLVM=1 to tell the Makefile to use Clang instead of GCC
          make ARCH=arm64 LLVM=1 blossom_defconfig
          make ARCH=arm64 LLVM=1 scripts prepare

      - name: Compile Sashimi Module
        run: |
          cd kernel-source
          # We run the command FROM the kernel directory 
          # and point M to the external module folder
          make ARCH=arm64 LLVM=1 M=$GITHUB_WORKSPACE/sashimi-module modules


          
      - name: Upload Kernel Module (.ko)
        uses: actions/upload-artifact@v4
        with:
          name: sashimi_test_ko
          path: sashimi-module/*.ko
