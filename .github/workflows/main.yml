name: Build Sashimi Out-of-Tree Module
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Module Code
        uses: actions/checkout@v4
        with:
          path: module-source

      - name: Checkout Sashimi Kernel Source
        uses: actions/checkout@v4
        with:
          repository: YOUR_USERNAME/YOUR_KERNEL_REPO
          path: kernel-source
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Build Essentials
        run: sudo apt-get update && sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison

      - name: Prepare Kernel Headers
        run: |
          cd kernel-source
          make ARCH=arm64 dandelion_defconfig
          make ARCH=arm64 modules_prepare

      - name: Compile Module
        run: |
          cd module-source
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KDIR=$GITHUB_WORKSPACE/kernel-source
          
      - name: Upload .ko
        uses: actions/upload-artifact@v4
        with:
          name: sashimi-test-ko
          path: module-source/sashimi_test.ko
