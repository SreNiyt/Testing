name: Build Sashimi Module (In-Tree)
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Module Code
        uses: actions/checkout@v4
        with:
          path: sashimi-module

      - name: Checkout Sashimi Kernel Source
        uses: actions/checkout@v4
        with:
          repository: zyexro/sashimi_kernel_xiaomi_blossom
          path: kernel-source

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison clang llvm lld

      - name: Inject Module into Kernel Tree
        run: |
          # 1. Copy your C file directly into the kernel's misc drivers folder
          cp sashimi-module/sashimi_test.c kernel-source/drivers/misc/
          
          # 2. Append our module to the kernel's official Makefile
          echo 'obj-m += sashimi_test.o' >> kernel-source/drivers/misc/Makefile

      - name: Compile Kernel Modules
        run: |
          cd kernel-source
          make ARCH=arm64 LLVM=1 blossom_defconfig
          
          # 3. Build modules natively. No M= flag, no lost headers!
          # -j$(nproc) makes it use all CPU cores so it builds extremely fast
          make ARCH=arm64 LLVM=1 modules -j$(nproc)

      - name: Upload Kernel Module (.ko)
        uses: actions/upload-artifact@v4
        with:
          name: sashimi_test_ko
          # 4. Pull the finished artifact right out of the kernel tree
          path: kernel-source/drivers/misc/sashimi_test.ko
