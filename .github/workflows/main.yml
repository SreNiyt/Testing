name: Build Sashimi Out-of-Tree Module
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to run this manually

jobs:
  build:
    runs-on: ubuntu-24.04-arm # Fast native ARM runners
    steps:
      - name: Checkout Module Code
        uses: actions/checkout@v4
        with:
          path: sashimi-module

      - name: Checkout Sashimi Kernel Source
        uses: actions/checkout@v4
        with:
          repository: zyexro/sashimi_kernel_xiaomi_blossom
          path: kernel-source

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison gcc-aarch64-linux-gnu

      - name: Prepare Kernel Headers
        run: |
          cd kernel-source
          # Using the correct MT6765 config for the Blossom/Dandelion hardware
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- mt6765_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

      - name: Compile Sashimi Module
        run: |
          cd sashimi-module
          # KDIR points to the kernel-source we just prepared
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KDIR=$GITHUB_WORKSPACE/kernel-source
          
      - name: Upload Kernel Module (.ko)
        uses: actions/upload-artifact@v4
        with:
          name: sashimi_test_ko
          path: sashimi-module/*.ko
