name: Build Sash Out-of-Tree Module
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Module Code
        uses: actions/checkout@v4
        with:
          path: sashimi-module

      - name: Checkout Sashimi Kernel Source
        uses: actions/checkout@v4
        with:
          repository: zyexro/sashimi_kernel_xiaomi_blossom
          path: kernel-source

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison gcc-aarch64-linux-gnu

      - name: Prepare Kernel Headers
        run: |
          cd kernel-source
          # We already know it's blossom_defconfig now
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- blossom_defconfig
          
          # Replace modules_prepare with 'scripts' and 'prepare'
          # This builds the internal tools needed for external modules
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- scripts prepare


      - name: Compile Sashimi Module
        run: |
          cd sashimi-module
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KDIR=$GITHUB_WORKSPACE/kernel-source
          
      - name: Upload Kernel Module (.ko)
        uses: actions/upload-artifact@v4
        with:
          name: sashimi_test_ko
          path: sashimi-module/*.ko
